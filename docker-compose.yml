services:
  backend:
    build:
      context: ./backend
    container_name: docx_pdf_chunk_annotator_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    container_name: docx_pdf_chunk_annotator_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

